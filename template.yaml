AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PR Code Review Agent — Lambda + API Gateway

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
  GithubToken:
    Type: String
    NoEcho: true
  GithubWebhookSecret:
    Type: String
    NoEcho: true
  WeaviateUrl:
    Type: String
  WeaviateApiKey:
    Type: String
    NoEcho: true
  SupabaseUrl:
    Type: String
  SupabaseServiceKey:
    Type: String
    NoEcho: true
  LangsmithApiKey:
    Type: String
    NoEcho: true
  LangsmithProject:
    Type: String
    Default: pr-review-agent
  PromptVersion:
    Type: String
    Default: v1

Globals:
  Function:
    Runtime: python3.11
    MemorySize: 1024
    Timeout: 30
    Architectures:
      - arm64

Resources:
  PRReviewFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.main.handler
      CodeUri: .
      Description: LangGraph agent that reviews GitHub PR diffs
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          GITHUB_TOKEN: !Ref GithubToken
          GITHUB_WEBHOOK_SECRET: !Ref GithubWebhookSecret
          WEAVIATE_URL: !Ref WeaviateUrl
          WEAVIATE_API_KEY: !Ref WeaviateApiKey
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_KEY: !Ref SupabaseServiceKey
          LANGSMITH_API_KEY: !Ref LangsmithApiKey
          LANGSMITH_PROJECT: !Ref LangsmithProject
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: !Ref LangsmithProject
          PROMPT_VERSION: !Ref PromptVersion
      Events:
        Webhook:
          Type: Api
          Properties:
            Path: /webhook
            Method: post

Outputs:
  WebhookUrl:
    Description: API Gateway endpoint URL for the webhook
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhook"
